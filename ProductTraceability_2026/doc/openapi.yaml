  # ==========================================
  # Enterprise Registration (Public)
  # ==========================================
  /api/enterprise/register:
    post:
      summary: "✅ Enterprise registration (create enterprise + user account)"
      description: |
        Business flow: create enterprise record (auditStatus=0 pending) + create user account (userType=2, linked to enterprise).
        No authentication required.
      tags: [Enterprise]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enterpriseName, enterpriseCode, enterpriseType, username, password]
              properties:
                enterpriseName: { type: string }
                enterpriseCode: { type: string, description: "Unified social credit code" }
                enterpriseType: { type: integer, description: "1-farming, 2-processing, 3-quarantine" }
                legalPerson: { type: string }
                contactPerson: { type: string }
                contactPhone: { type: string }
                address: { type: string }
                businessLicense: { type: string }
                productionLicense: { type: string }
                username: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Registration successful

