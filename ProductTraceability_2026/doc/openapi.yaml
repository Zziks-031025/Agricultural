openapi: 3.0.3
info:
  title: Agricultural Traceability System API
  version: 1.0.0
  description: API specification for the agricultural product traceability system.

servers:
  - url: '{baseUrl}'
    variables:
      baseUrl:
        default: http://localhost:8888

paths:
  # ==========================================
  # Auth
  # ==========================================
  /auth/login:
    post:
      summary: "[Full] User login"
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 200 }
                  data:
                    type: object
                    properties:
                      token: { type: string }
                      userInfo: { $ref: '#/components/schemas/UserInfo' }

  /auth/info:
    get:
      summary: "[Full] Get current user info"
      tags: [Auth]
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 200 }
                  data: { $ref: '#/components/schemas/UserInfo' }

  /auth/logout:
    post:
      summary: "[Full] Logout"
      tags: [Auth]
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Success

  # ==========================================
  # Enterprise Audit (Admin)
  # ==========================================
  /api/enterprise/audit/list:
    get:
      summary: "[Full] Enterprise audit list"
      tags: [Enterprise]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: pageNum, in: query, schema: { type: integer, default: 1 } }
        - { name: pageSize, in: query, schema: { type: integer, default: 10 } }
        - { name: auditStatus, in: query, schema: { type: integer }, description: "0-pending, 1-approved, 2-rejected" }
        - { name: enterpriseType, in: query, schema: { type: integer }, description: "1-farm, 2-processor, 3-inspector" }
        - { name: keyword, in: query, schema: { type: string } }
      responses:
        '200':
          description: Paginated enterprise list

  /api/enterprise/audit/detail/{id}:
    get:
      summary: "[Full] Enterprise audit detail"
      tags: [Enterprise]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Enterprise detail

  /api/enterprise/audit/approve:
    post:
      summary: "[Full] Approve or reject enterprise"
      tags: [Enterprise]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enterpriseId, auditStatus]
              properties:
                enterpriseId: { type: integer }
                auditStatus: { type: integer, description: "1-approve, 2-reject" }
                auditRemark: { type: string }
      responses:
        '200':
          description: Success

  /api/enterprise/detail/{id}:
    get:
      summary: "[Full] Enterprise detail by ID (includes coverImage field)"
      tags: [Enterprise]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Enterprise detail, response data includes coverImage (enterprise background/cover image path)

  # ==========================================
  # Batch Management
  # ==========================================
  /api/batch/list:
    get:
      summary: "[Full] Batch list"
      tags: [Batch]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: pageNum, in: query, schema: { type: integer } }
        - { name: pageSize, in: query, schema: { type: integer } }
        - { name: status, in: query, schema: { type: integer } }
        - { name: keyword, in: query, schema: { type: string } }
        - { name: productType, in: query, schema: { type: integer } }
      responses:
        '200':
          description: Paginated batch list

  /api/batch/detail:
    get:
      summary: "[Full] Batch detail"
      tags: [Batch]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: batchCode, in: query, schema: { type: string } }
        - { name: id, in: query, schema: { type: integer } }
      responses:
        '200':
          description: Batch detail

  /api/batch/status-count:
    get:
      summary: "[Full] Batch status count"
      tags: [Batch]
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Count by status

  /api/batch/create:
    post:
      summary: "[Full] Create batch - auto-generates batchCode and qrCodeUrl"
      description: |
        Create a new trace batch.
        Auto-fills: batchCode, productName/unit defaults, productionDate, qrCodeUrl.
      tags: [Batch]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productType, enterpriseId]
              properties:
                productType: { type: integer, description: "1-chicken, 2-tomato" }
                productName: { type: string, description: "Auto-filled if empty" }
                breed: { type: string }
                quantity: { type: number }
                unit: { type: string, description: "Auto-filled if empty" }
                originLocation: { type: string }
                latitude: { type: number }
                longitude: { type: number }
                manager: { type: string }
                plantArea: { type: string }
                greenhouseNo: { type: string }
                seedSource: { type: string }
                enterpriseId: { type: integer }
                productionDate: { type: string, format: date, description: "Defaults to today" }
                expectedHarvestDate: { type: string, format: date }
      responses:
        '200':
          description: "Returns id, batchCode, qrCodeUrl"

  /api/batch/quarantine-check/{batchCode}:
    get:
      summary: "[Full] Check quarantine status"
      tags: [Batch]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: batchCode, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Quarantine check result

  /api/batch/receive:
    post:
      summary: "[Full] Receive batch (processor)"
      tags: [Batch]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [batchCode]
              properties:
                batchCode: { type: string }
                batchId: { type: integer }
      responses:
        '200':
          description: Success

  # ==========================================
  # Growth Records
  # ==========================================
  /api/record/list:
    get:
      summary: "[Partial] Growth record list - frontend implemented, backend needed"
      tags: [Record]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: pageNum, in: query, schema: { type: integer } }
        - { name: pageSize, in: query, schema: { type: integer } }
        - { name: batchId, in: query, schema: { type: integer } }
        - { name: recordType, in: query, schema: { type: string } }
      responses:
        '200':
          description: Paginated record list

  /api/record/create:
    post:
      summary: "[Partial] Create growth record - frontend implemented, backend needed"
      tags: [Record]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [batchId, recordType, recordDate, itemName]
              properties:
                batchId: { type: integer }
                batchCode: { type: string }
                recordType: { type: string, enum: [feeding, vaccine, inspect, fertilize, irrigate, pesticide] }
                recordDate: { type: string, format: date }
                itemName: { type: string }
                amount: { type: string }
                operator: { type: string }
                description: { type: string }
      responses:
        '200':
          description: Created record

  /api/record/delete/{id}:
    delete:
      summary: "[✅ Full] Delete growth record (soft delete, files cleaned after 7 days)"
      tags: [Record]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Deleted

  # ==========================================
  # Quarantine
  # ==========================================
  /api/quarantine/apply:
    post:
      summary: "✅ Farmer applies for quarantine inspection"
      description: |
        Creates a pending inspection record (checkResult=null), updates batch status to 3 (pending quarantine).
        Uploads "QUARANTINE_APPLY" action hash to blockchain (non-blocking).
        Does NOT fill checkResult/certNo/inspector fields.
      tags: [Quarantine]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [batchCode]
              properties:
                batchCode: { type: string }
                batchId: { type: integer }
                applyQuantity: { type: number, description: "Number of livestock to inspect" }
                expectedDate: { type: string, format: date, description: "Expected inspection date" }
                enterpriseId: { type: integer }
                inspectionEnterpriseId: { type: integer, description: "Target quarantine enterprise ID" }
                remark: { type: string }
      responses:
        '200':
          description: Apply submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 200 }
                  message: { type: string }
                  data:
                    type: object
                    properties:
                      inspectionId: { type: integer }
                      batchId: { type: integer }
                      batchCode: { type: string }
                      batchStatus: { type: integer, example: 3 }
                      txHash: { type: string }

  /api/quarantine/apply/delete/{id}:
    delete:
      summary: "✅ Delete quarantine apply record (pending only)"
      description: |
        Deletes a quarantine apply record. Only records with check_result IS NULL (pending) can be deleted.
        After deletion, the batch status is restored to 2 (breeding).
      tags: [Quarantine]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Deleted successfully

  /api/quarantine/apply/list:
    get:
      summary: "✅ Query quarantine apply list by enterprise"
      description: |
        Returns quarantine inspection records for the given enterprise.
        Records where check_result IS NULL are "pending", otherwise "completed".
        Used by farming enterprises (type1) to track their quarantine applications.
      tags: [Quarantine]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: enterpriseId, in: query, required: true, schema: { type: integer } }
        - { name: batchCode, in: query, required: false, schema: { type: string }, description: "Fuzzy search by batch code" }
        - { name: status, in: query, required: false, schema: { type: string, enum: [pending, completed] }, description: "pending=checkResult IS NULL, completed=checkResult IS NOT NULL" }
      responses:
        '200':
          description: List of quarantine apply records
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 200 }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        batchId: { type: integer }
                        batchCode: { type: string }
                        productName: { type: string }
                        quantity: { type: number }
                        unit: { type: string }
                        inspectionDate: { type: string, format: date }
                        checkResult: { type: integer, nullable: true, description: "null=pending, 1=pass, 0=fail" }
                        statusText: { type: string, description: "待受理/合格/不合格" }
                        certNo: { type: string }
                        inspector: { type: string }
                        txHash: { type: string }
                        remark: { type: string }
                        createTime: { type: string, format: date-time }

  /api/quarantine/submit:
    post:
      summary: "[Full] Submit quarantine result"
      tags: [Quarantine]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [batchCode, inspectionDate, checkResult, inspectionItems, certNo, inspector]
              properties:
                batchCode: { type: string }
                batchId: { type: integer }
                inspectionDate: { type: string, format: date }
                checkResult: { type: integer, description: "1-pass, 0-fail" }
                inspectionItems: { type: string }
                certNo: { type: string }
                inspector: { type: string }
                inspectorCode: { type: string }
                certImages: { type: array, items: { type: string } }
      responses:
        '200':
          description: Submitted

  # ==========================================
  # Trace Query
  # ==========================================
  /api/trace/detail:
    get:
      summary: "[Full] Trace detail with full lifecycle timeline"
      description: |
        Aggregates data from trace_batch, trace_record, trace_inspection,
        trace_processing, trace_storage, trace_transport, trace_sale.
        Returns batchInfo + timeline[] + enterpriseInfo.
        Each timeline node: { stage, title, time, operator, txHash, blockNumber, details{}, images[], official? }
      tags: [Trace]
      parameters:
        - { name: batchId, in: query, required: true, schema: { type: string }, description: "batch ID or batch code" }
      responses:
        '200':
          description: Aggregated trace timeline

  /api/blockchain/verify:
    post:
      summary: "[Full] Verify blockchain data integrity"
      tags: [Trace]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                batchId: { type: integer }
                batchCode: { type: string }
      responses:
        '200':
          description: Verification result

  /api/blockchain/stats:
    get:
      summary: "[Partial] Blockchain statistics - frontend implemented, backend needed"
      description: |
        Returns on-chain statistics for the admin dashboard.
        Frontend: blockchain/data.vue (ECharts)
        Backend: NOT YET IMPLEMENTED
      tags: [Trace]
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Blockchain stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 200 }
                  data:
                    type: object
                    properties:
                      totalOnChain: { type: integer }
                      todayOnChain: { type: integer }
                      successRate: { type: number }
                      avgGas: { type: string }
                      dailyTrend:
                        type: array
                        items:
                          type: object
                          properties:
                            date: { type: string }
                            count: { type: integer }
                            gas: { type: number }
                      stageDistribution:
                        type: array
                        items:
                          type: object
                          properties:
                            name: { type: string }
                            value: { type: integer }

  /api/blockchain/logs:
    get:
      summary: "[Full] Blockchain on-chain log list"
      description: |
        Returns paginated on-chain transaction logs for enterprise users.
        Aggregates from all business tables (trace_batch, trace_record, etc.)
      tags: [Blockchain]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: pageNum, in: query, schema: { type: integer, default: 1 } }
        - { name: pageSize, in: query, schema: { type: integer, default: 10 } }
        - { name: enterpriseId, in: query, schema: { type: integer } }
        - { name: bizType, in: query, schema: { type: string, enum: [batch_init, growth_record, quarantine, processing, storage, transport, sale] } }
        - { name: status, in: query, schema: { type: integer, description: "1-success, 0-failed" } }
      responses:
        '200':
          description: Paginated log list with summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 200 }
                  data:
                    type: object
                    properties:
                      records:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: integer }
                            txHash: { type: string }
                            blockHeight: { type: string }
                            bizType: { type: string }
                            batchCode: { type: string }
                            enterpriseName: { type: string }
                            contractAddress: { type: string }
                            chainTime: { type: string, format: date-time }
                            status: { type: integer, description: "1-success, 0-failed" }
                      total: { type: integer }
                      totalChained: { type: integer }
                      todayChained: { type: integer }
                      gasEstimate: { type: string }

  /api/blockchain/retry/{id}:
    post:
      summary: "[Partial] Retry failed on-chain transaction - frontend implemented"
      description: |
        Re-submits a failed blockchain transaction.
        Frontend: chain/upload.vue
        Backend: NOT YET IMPLEMENTED
      tags: [Blockchain]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Retry result

  # ==========================================
  # Processing
  # ==========================================
  /api/processing/create:
    post:
      summary: "[Full] Create processing record - resolves sourceBatchCode to batchId, auto-fills processingEnterpriseId, uploads hash to blockchain"
      tags: [Processing]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraceProcessing'
      responses:
        '200':
          description: Processing record created, batch status updated to 5, dataHash + txHash populated

  /api/processing/list:
    get:
      summary: "[Full] List processing records with batch info enrichment"
      description: |
        Returns paginated processing records enriched with batch info (batchCode, productName, breed, unit, batchStatus).
        Supports enterpriseId and keyword filtering.
      tags: [Processing]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: pageNum, in: query, schema: { type: integer, default: 1 } }
        - { name: pageSize, in: query, schema: { type: integer, default: 10 } }
        - { name: batchId, in: query, required: false, schema: { type: integer } }
        - { name: enterpriseId, in: query, required: false, schema: { type: integer } }
        - { name: keyword, in: query, required: false, schema: { type: string }, description: "Search by sourceBatchCode, processMethod, or operator" }
      responses:
        '200':
          description: OK

  # ==========================================
  # Storage
  # ==========================================
  /api/storage/list:
    get:
      summary: "[Full] Query storage records with pagination"
      tags: [Storage]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: pageNum, in: query, schema: { type: integer, default: 1 } }
        - { name: pageSize, in: query, schema: { type: integer, default: 10 } }
        - { name: batchId, in: query, schema: { type: integer } }
        - { name: storageType, in: query, schema: { type: integer, description: "1-inbound, 2-outbound, 3-inventory" } }
        - { name: keyword, in: query, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer }
                  data:
                    type: object
                    properties:
                      records: { type: array, items: { $ref: '#/components/schemas/TraceStorage' } }
                      total: { type: integer }

  /api/storage/create:
    post:
      summary: "[Full] Create a storage record - auto-fills storageUnit from batch"
      tags: [Storage]
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TraceStorage' }
      responses:
        '200':
          description: OK

  /api/storage/delete/{id}:
    delete:
      summary: "[Full] Delete a storage record"
      tags: [Storage]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: OK

  # ==========================================
  # Transport
  # ==========================================
  /api/transport/create:
    post:
      summary: "[Full] Create transport record - auto-fills departureTime, transportUnit"
      tags: [Transport]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraceTransport'
      responses:
        '200':
          description: Transport record created

  /api/transport/list:
    get:
      summary: "✅ List transport records (supports receiveEnterpriseId filter)"
      tags: [Transport]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: pageNum, in: query, schema: { type: integer, default: 1 } }
        - { name: pageSize, in: query, schema: { type: integer, default: 10 } }
        - { name: batchId, in: query, required: false, schema: { type: integer } }
        - { name: receiveEnterpriseId, in: query, required: false, schema: { type: integer }, description: "Filter by target processing enterprise" }
      responses:
        '200':
          description: OK

  # ==========================================
  # Sale
  # ==========================================
  /api/sale/create:
    post:
      summary: "[Full] Create sale record - auto updates batch status=8 and actual_harvest_date"
      tags: [Sale]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraceSale'
      responses:
        '200':
          description: Sale record created, batch status updated to 8, actual_harvest_date set

  /api/sale/list:
    get:
      summary: "[Full] List sale records"
      tags: [Sale]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: pageNum, in: query, schema: { type: integer, default: 1 } }
        - { name: pageSize, in: query, schema: { type: integer, default: 10 } }
        - { name: batchId, in: query, required: false, schema: { type: integer } }
      responses:
        '200':
          description: OK

  # ==========================================
  # Dashboard / Statistics
  # ==========================================
  /api/dashboard/farmer-stats:
    get:
      summary: "[Full] Farmer enterprise homepage stats"
      tags: [Dashboard]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: enterpriseId, in: query, required: false, schema: { type: integer } }
      responses:
        '200':
          description: activeBatchCount, totalLivestock, totalOnChain, warningCount, dailyTrend

  /api/dashboard/processor-stats:
    get:
      summary: "[Full] Processor enterprise homepage stats"
      description: |
        Returns KPI cards for type2 (processor) enterprise dashboard:
        todayReceived (batch count), todayProcessed (kg), pendingSaleInventory (kg),
        totalOnChain, processingTrend (7-day line), conversionRate (pie: input vs output).
      tags: [Dashboard]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: enterpriseId, in: query, required: false, schema: { type: integer } }
      responses:
        '200':
          description: Processor dashboard stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 200 }
                  data:
                    type: object
                    properties:
                      todayReceived: { type: integer, description: "Today inbound batch count" }
                      todayProcessed: { type: number, description: "Today output quantity (kg)" }
                      pendingSaleInventory: { type: number, description: "Processed but unsold inventory (kg)" }
                      totalOnChain: { type: integer }
                      processingTrend:
                        type: array
                        items:
                          type: object
                          properties:
                            date: { type: string }
                            amount: { type: number }
                      conversionRate:
                        type: array
                        items:
                          type: object
                          properties:
                            name: { type: string }
                            value: { type: number }

  /api/dashboard/analysis-stats:
    get:
      summary: "[Full] Data analysis statistics page"
      description: |
        Returns KPI cards (activeBatchCount, totalLivestock, passRate),
        inputTrend (30-day input usage), statusDistribution (pie),
        chainActivity (30-day on-chain count bar).
      tags: [Dashboard]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: enterpriseId, in: query, required: false, schema: { type: integer } }
      responses:
        '200':
          description: Analysis stats aggregation

  /api/dashboard/admin-stats:
    get:
      summary: "✅ Admin dashboard statistics"
      tags: [Dashboard]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: role, in: query, required: false, schema: { type: string } }
      responses:
        '200':
          description: type1Count, type2Count, type3Count, totalBatches, batchStatusCounts, monthlyBatches

  # ==========================================
  # Enterprise List Management (Admin)
  # ==========================================
  /api/enterprise/list:
    get:
      summary: "✅ Enterprise list with pagination (admin)"
      tags: [Enterprise]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: current, in: query, schema: { type: integer, default: 1 } }
        - { name: size, in: query, schema: { type: integer, default: 10 } }
        - { name: enterpriseName, in: query, schema: { type: string } }
        - { name: keyword, in: query, schema: { type: string }, description: "Search by name/code/contact" }
        - { name: enterpriseType, in: query, schema: { type: integer } }
