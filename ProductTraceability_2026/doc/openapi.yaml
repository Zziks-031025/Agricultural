                ids: { type: array, items: { type: integer } }
      responses:
        '200':
          description: Deleted

  # ==========================================
  # User Feedback
  # ==========================================
  /api/feedback/submit:
    post:
      summary: "✅ Submit user feedback"
      tags: [Feedback]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: { type: string, description: "Feedback content, min 10 chars" }
      responses:
        '200':
          description: Feedback submitted

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserInfo:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        realName: { type: string }
        avatar: { type: string }
        userType: { type: integer, description: "1-admin, 2-enterprise, 3-consumer" }
        enterpriseId: { type: integer }
        enterpriseType: { type: integer, description: "1-farm, 2-processor, 3-inspector" }
        enterpriseName: { type: string }
        roles: { type: array, items: { type: string } }
        permissions: { type: array, items: { type: string } }

    TraceProcessing:
      type: object
      properties:
        id: { type: integer }
        batchId: { type: integer, description: "Auto-resolved from sourceBatchCode" }
        sourceBatchCode: { type: string }
        processingEnterpriseId: { type: integer, description: "Auto-mapped from frontend enterpriseId" }
        processingDate: { type: string, format: date }
        processMethod: { type: string, description: "e.g. zhengji/fenqie/qugu" }
        specs: { type: string, description: "Packaging spec e.g. 500g/bag" }
        operator: { type: string }
        inputQuantity: { type: number }
        outputQuantity: { type: number }
        images: { type: string, description: "JSON array of image URLs" }
        dataHash: { type: string, description: "SHA-256 hash for blockchain" }
        txHash: { type: string }
        blockNumber: { type: integer }
        chainTime: { type: string, format: date-time }
        remark: { type: string }

    TraceStorage:
      type: object
      properties:
        id: { type: integer }
        batchId: { type: integer }
        batchCode: { type: string, description: "Frontend sends batchCode, backend resolves to batchId" }
        storageEnterpriseId: { type: integer }
        storageType: { type: integer, description: "1-inbound, 2-outbound, 3-inventory check" }
        storageDate: { type: string, format: date }
        warehouseName: { type: string, description: "Frontend field: warehouseName (was warehouseNo)" }
        warehouseLocation: { type: string }
        storageQuantity: { type: number }
        storageUnit: { type: string }
        temperature: { type: number, description: "Celsius" }
        humidity: { type: number, description: "Percentage" }
        storageCondition: { type: string }
        operator: { type: string, description: "Frontend field: operator (was manager)" }
        images: { type: string, description: "JSON array of image URLs" }
        txHash: { type: string }
        blockNumber: { type: integer }
        chainTime: { type: string, format: date-time }
        dataHash: { type: string }
        remark: { type: string }

    TraceTransport:
      type: object
      properties:
        id: { type: integer }
        batchId: { type: integer }
        batchCode: { type: string, description: "Frontend sends batchCode, backend resolves to batchId" }
        logisticsNo: { type: string }
        transportEnterpriseId: { type: integer }
        transportDate: { type: string, format: date }
        plateNumber: { type: string }
        driverName: { type: string }
        driverPhone: { type: string }
        receiverName: { type: string }
        departureLocation: { type: string }
        destination: { type: string }
        departureTime: { type: string, format: date-time, description: "Auto-filled by backend if not provided" }
        arrivalTime: { type: string, format: date-time }
        transportQuantity: { type: number }
        transportUnit: { type: string, description: "Auto-filled from batch.unit" }
        temperature: { type: number, description: "Celsius" }
        humidity: { type: number, description: "Percentage" }
        transportCondition: { type: string }
        gpsTrack: { type: string, description: "JSON with lat/lng of departure point" }
        images: { type: string, description: "JSON array of image URLs" }
        txHash: { type: string }
        blockNumber: { type: integer }
        chainTime: { type: string, format: date-time }
        dataHash: { type: string }
        remark: { type: string }

    TraceSale:
      type: object
      properties:
        id: { type: integer }
        batchId: { type: integer }
        batchCode: { type: string, description: "Frontend sends batchCode, backend resolves to batchId" }
        saleEnterpriseId: { type: integer }
        saleDate: { type: string, format: date }
        saleTime: { type: string, description: "HH:mm:ss format" }
        buyerName: { type: string }
        saleQuantity: { type: number }
        saleUnit: { type: string }
        salePrice: { type: number }
        totalAmount: { type: number }
        saleVoucher: { type: string, description: "JSON array of invoice image URLs" }
        saleChannel: { type: string }
        destination: { type: string }
        txHash: { type: string }
        blockNumber: { type: integer }
        chainTime: { type: string, format: date-time }
        dataHash: { type: string }
        remark: { type: string }

    SysBanner:
      type: object
      properties:
        id: { type: integer }
        enterpriseId: { type: integer, description: "Enterprise ID, null for platform-level" }
        title: { type: string }
        description: { type: string }
        imageUrl: { type: string }
        linkUrl: { type: string }
        targetType: { type: integer, description: "0-all, 1-farming, 2-processing, 3-quarantine" }
        sortOrder: { type: integer }
        status: { type: integer, description: "0-disabled, 1-enabled" }

    EduArticle:
      type: object
      properties:
        id: { type: integer }
        enterpriseId: { type: integer, description: "Enterprise ID, null for platform-level" }
        category: { type: string, description: "farming/vaccine/process/hygiene/quarantine/blockchain/safety" }
        title: { type: string }
        author: { type: string }
        summary: { type: string }
        coverUrl: { type: string }
        content: { type: string, description: "JSON array of content blocks" }
        viewCount: { type: integer }
        sortOrder: { type: integer }
        status: { type: integer, description: "0-draft, 1-published" }
        publishTime: { type: string, format: date-time }
